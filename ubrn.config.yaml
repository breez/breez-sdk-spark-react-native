rust:
  repo: https://github.com/breez/spark-sdk
  rev: 73c3923c92130feb924e5011852be1ac66206b71
  manifestPath: crates/breez-sdk/bindings/Cargo.toml
bindings:
  cpp: cpp/generated
  ts: src/generated
android:
  useSharedLibrary: true
  # Disable server-side storage features (postgres, mysql) to reduce binary size (not needed for mobile)
  cargoExtras:
    - --no-default-features
ios:
  targets:
    - aarch64-apple-ios
    - aarch64-apple-ios-sim
    - x86_64-apple-ios
  frameworkName: build/RnBreezSdkSpark
  # Disable server-side storage features (postgres, mysql) to reduce binary size (not needed for mobile)
  cargoExtras:
    - --no-default-features
turboModule:
  cpp: cpp
  ts: src